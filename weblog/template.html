<!DOCTYPE html>
<html lang="en">
<head>
<title>{weblog-title}{separator}{post-title}</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{feeds}
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400;1,8..60,600&display=swap');

:root {
	--bg: #282828;
	--fg: #ebdbb2;
	--fg-muted: #a89984;
	--link: #83a598;
	--link-visited: #8ec07c;
	--heading: #fabd2f;
	--subheading: #b8bb26;
	--accent: #665c54;
	--border: #3c3836;
	--code-bg: #1d2021;
	--tag-bg: #3c3836;
	--tag-fg: #d5c4a1;
	--quote-border: #d65d0e;
	--quote-fg: #bdae93;
}

@media (prefers-color-scheme: light) {
	:root {
		--bg: #f6ebc1;
		--fg: #3c3836;
		--fg-muted: #7c6f64;
		--link: #458588;
		--link-visited: #689d6a;
		--heading: #d79921;
		--subheading: #98971a;
		--accent: #a89984;
		--border: #d5c4a1;
		--code-bg: #ebdbb2;
		--tag-bg: #d5c4a1;
		--tag-fg: #3c3836;
		--quote-border: #d65d0e;
		--quote-fg: #504945;
	}
}

* {
	box-sizing: border-box;
}

body {
	font-family: 'Geist Mono', monospace;
	font-size: 15px;
	line-height: 1.7;
	color: var(--fg);
	background: var(--bg);
	margin: 0;
	padding: 0;
}

header, main, footer {
	max-width: 42em;
	margin: 0 auto;
	padding: 0 1.5em;
}

header {
	margin-top: 3em;
	margin-bottom: 2em;
	padding-bottom: 1em;
	border-bottom: 1px solid var(--border);
}

.weblog-title a {
	text-decoration: none;
	color: var(--heading);
	font-size: 1.1em;
}

header nav ul {
	list-style: none;
	margin: 0.5em 0 0 0;
	padding: 0;
}

header nav li {
	display: inline-block;
}

header nav li a {
	display: block;
	text-decoration: none;
	margin-right: 1.5em;
	color: var(--fg-muted);
	font-size: 0.85em;
}

header nav li a:hover {
	color: var(--fg);
}

h1 {
	color: var(--heading);
	font-size: 1.4em;
	font-weight: 700;
	margin: 0 0 0.5em 0;
}

h2 {
	color: var(--subheading);
	font-size: 1.2em;
	font-weight: 700;
	margin: 1.5em 0 0.5em 0;
}

h3, h4, h5, h6 {
	color: var(--fg);
	font-size: 1em;
	font-weight: 700;
	margin: 1.5em 0 0.5em 0;
}

p, li {
	line-height: 1.7;
}

a:link { color: var(--link); }
a:visited { color: var(--link-visited); }
a:hover { text-decoration: none; }

blockquote {
	font-family: 'Source Serif 4', Georgia, serif;
	font-size: 1.05rem;
	font-style: italic;
	line-height: 1.7;
	border-left: 3px solid var(--quote-border);
	margin: 1.75em 0;
	padding: 0.5em 0 0.5em 1.4em;
	color: var(--quote-fg);
}

blockquote p {
	margin: 0 0 0.5em 0;
}

blockquote p:last-child {
	margin-bottom: 0;
}

code {
	font-family: 'Geist Mono', monospace;
	font-size: 0.9em;
	padding: 0.15em 0.35em;
	background: var(--code-bg);
	border-radius: 3px;
}

pre {
	margin: 1.5em 0;
}

pre code {
	display: block;
	padding: 1em 1.2em;
	overflow-x: auto;
	line-height: 1.5;
}

ul {
	padding-left: 1.5em;
}

li {
	margin: 0.3em 0;
}

hr {
	border: 0;
	height: 1px;
	background: var(--border);
	margin: 2.5em 0;
}

img {
	max-width: 100%;
}

table {
	border-collapse: collapse;
	margin: 1.5em 0;
}

td, th {
	padding: 0.5em 0.8em;
	text-align: left;
	border: 1px solid var(--accent);
}

article {
	display: flex;
	flex-direction: column;
}

article p,
article li {
	font-family: 'Source Serif 4', Georgia, serif;
	font-size: 1.1rem;
	line-height: 1.75;
	letter-spacing: 0.01em;
	word-spacing: 0.03em;
}

article p {
	margin: 0 0 1.2em 0;
}

article p + p {
	margin-top: 0;
}

article ul,
article ol {
	padding-left: 1.3em;
}

article li {
	margin: 0.35em 0;
}

article h1 {
	order: -2;
}

.post-date {
	order: -1;
	font-size: 0.8em;
	color: var(--fg-muted);
	margin-bottom: 1.2em;
}

.post-tags {
	font-size: 0.8em;
	margin-top: 0.5em;
}

.tag {
	background: var(--tag-bg);
	color: var(--tag-fg);
	padding: 0.2em 0.5em;
	margin-right: 0.4em;
	border-radius: 3px;
	text-decoration: none;
	font-size: 0.85em;
}

.tag:hover {
	background: var(--accent);
}

.recent-posts {
	margin-top: 1em;
}

.recent-posts ul {
	list-style: none;
	padding: 0;
}

.recent-posts li {
	margin: 0.6em 0;
}

.recent-posts li a {
	color: var(--fg);
	text-decoration: none;
}

.recent-posts li a:hover {
	color: var(--link);
}

footer {
	margin-top: 4em;
	margin-bottom: 3em;
	padding-top: 1em;
	border-top: 1px solid var(--border);
}

footer p {
	font-size: 0.75em;
	color: var(--fg-muted);
}

footer a {
	color: var(--fg-muted);
}

@media (max-width: 42em) {
	main {
		text-align: justify;
		-webkit-hyphens: auto;
		hyphens: auto;
	}

	h1, h2, h3, h4, h5, h6 {
		text-align: left;
	}

	article p,
	article li,
	article blockquote {
		font-size: 1.0625rem;
		letter-spacing: 0.005em;
	}
}
</style>
</head>
<body>

<header>
	<span class="weblog-title"><a href="{base-path}">{weblog-title}</a></span>
	{navigation}
</header>

<main>

<article>
	<div class="post-date">{date}</div>
	{body}
	<div class="post-tags">
		{tags}
	</div>
</article>

<hr>

<div class="recent-posts">
<h2>Recent</h2>
{recent-posts}
</div>

</main>

<footer>
	<p>Also available via <a href="https://portal.mozz.us/gemini/gemini.h14h.com/">Gemini</a></p>
</footer>

</body>
</html>
