name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-gemini:
    name: Deploy to Geminispace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-weblog:
    name: Deploy to omg.lol
    runs-on: ubuntu-latest
    env:
      OMGLOL_API_KEY: ${{ secrets.OMGLOL_API_KEY }}
      OMGLOL_ADDRESS: h14h
      WEBLOG_BASE: https://blog.h14h.com
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Push profile page
        run: |
          set -euo pipefail
          python3 -c "
          import json
          html = open('weblog/profile.html').read()
          css = open('weblog/profile.css').read()
          content = html.replace('{{CSS}}', css)
          print(json.dumps({'content': content, 'publish': True}))
          " | curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $OMGLOL_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- \
            "https://api.omg.lol/address/$OMGLOL_ADDRESS/web"

      - name: Push weblog config
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $OMGLOL_API_KEY" \
            -H "Content-Type: text/plain" \
            --data-binary @weblog/configuration.conf \
            "https://api.omg.lol/address/$OMGLOL_ADDRESS/weblog/configuration"

      - name: Push weblog template
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $OMGLOL_API_KEY" \
            -H "Content-Type: text/plain" \
            --data-binary @weblog/template.html \
            "https://api.omg.lol/address/$OMGLOL_ADDRESS/weblog/template"

      - name: Push landing page template
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $OMGLOL_API_KEY" \
            -H "Content-Type: text/plain" \
            --data-binary @weblog/landing-page-template.html \
            "https://api.omg.lol/address/$OMGLOL_ADDRESS/weblog/entry/landing-page-template"

      - name: Publish posts
        run: |
          set -euo pipefail
          for file in content/gemlog/[0-9]*.gmi; do
            [ -f "$file" ] || continue
            filename=$(basename "$file" .gmi)

            echo "$filename" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}-.+$' || continue
            date=$(echo "$filename" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}')
            slug=$(echo "$filename" | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')

            echo "Publishing: $slug"

            md_content=$(gawk '{
              if ($1 == "=>") {
                url=$2; $1=""; $2=""; sub("  ", "");
                label = ($0 ~ /[^ ]/) ? $0 : url;
                print "[" label "](" url ")\n";
              } else { print }
            }' "$file" \
            | sed -E \
              -e '/^\* Published: [0-9]{4}-[0-9]{2}-[0-9]{2}$/d' \
              -e "s|\(gemini://gemini\.h14h\.com/gemlog/([0-9]{4})-([0-9]{2})-[0-9]{2}-([^)]+)\.gmi\)|(${WEBLOG_BASE}/\1/\2/\3)|g" \
              -e "s|\(gemini://([^)]+)\)|(https://portal.mozz.us/gemini/\1)|g")

            curl --fail-with-body -sS -X PUT \
              -H "Authorization: Bearer $OMGLOL_API_KEY" \
              -H "Content-Type: text/plain" \
              -d "---
          Date: ${date}
          Slug: ${slug}
          ---

          ${md_content}" \
              "https://api.omg.lol/address/$OMGLOL_ADDRESS/weblog/entry/${slug}"
          done
